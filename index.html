<!doctype html>
<html lang="pt-">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tekken-6 Dataframe</title>
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body class="theme-1">
    <div
      id="app"
      class="bg-neutral-600 fixed inset-0 bg-gradient-to-tr from-indigo-800/27 to-black/65"
    >
      <div
        class="bg-[url(/src/assets/tekken-logo.png)] bg-no-repeat bg-top-right bg-contain sm:bg-auto h-dvh fixed inset-0 opacity-18"
      ></div>
      <!-- <div
        class="bg-[url(/src/assets/noise.svg)] z-1 bg-no-repeat bg-center bg-cover h-dvh fixed inset-0 opacity-35"
      ></div> -->
      <div
        class="w-full fixed inset-0 p-1 pt-2 sm:p-5 flex justify-center z-90 flex-col-reverse sm:flex-row h-dvh"
      >
        <nav
          id="main-nav"
          class="h-8/100 sm:pt-2 sm:fixed inset-0 text-lg sm:text-xl bg-black/80 sm:bg-transparent border-t-gray-500 border-t-1 sm:border-none sm:h-full items-cjenter sm:items-start sm:w-50 max-w-full overflow-x-auto overflow-dy-auto flex sm:flex-col text-white/80"
        ></nav>
        <div class="flex h-92/100 sm:h-full flex-1 flex-col gap-2">
          <div class="h-5/100 w-full text-gray-300 text-center sm:text-xl">
            <p id="CharName" class="text-xl text font-black">
              Tekken 6 Framedata
            </p>
          </div>
          <div
            class="h-95/100 sm:items-center flex flex-col w-full max-w-full overfflow-y-auto"
          >
            <div
              id="main-container"
              class="flex flex-col gap-5 h-full w-full sm:w-auto max-w-dvw"
            ></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
